backend:
  name: github
  repo: liquid1188/christa-dalmazio
  branch: main
  # auth_endpoint is set at launch to the Sveltia OAuth worker (see notes).

# Where uploaded photos are stored / referenced
media_folder: "assets/img"
public_folder: "/assets/img"

# Keep the editor small and friendly: only the things that change often.
# More sections (bio, endorsements, gallery) are added as pages are migrated.
collections:
  - name: "updates"
    label: "Upcoming & Announcements"
    icon: "calendar_month"
    files:
      - name: "feed"
        label: "Upcoming & Announcements"
        file: "src/_data/updates.json"
        description: >-
          Add upcoming concerts and announcements. The newest item shows first
          automatically — you don't need to reorder anything.
        fields:
          - name: "items"
            label: "Entries"
            label_singular: "Entry"
            widget: "list"
            summary: "{{fields.title}}  ·  {{fields.date}}"
            fields:
              - name: "type"
                label: "Type"
                widget: "select"
                options:
                  - { label: "Event (upcoming performance)", value: "event" }
                  - { label: "Announcement (news, recording, feature)", value: "announcement" }
                default: "event"
              - name: "title"
                label: "Title"
                widget: "string"
              - name: "date"
                label: "Date"
                widget: "datetime"
                date_format: "YYYY-MM-DD"
                time_format: false
                picker_utc: true
              - name: "location"
                label: "Location (events only — leave blank for announcements)"
                widget: "string"
                required: false
              - name: "body"
                label: "Description"
                widget: "text"
              - name: "link"
                label: "Link (optional)"
                widget: "string"
                required: false

  - name: "endorsements"
    label: "Endorsements"
    icon: "format_quote"
    files:
      - name: "list"
        label: "Endorsements"
        file: "src/_data/endorsements.json"
        description: >-
          Each person already has a card on the homepage. Paste their quote into
          the Quote box as it arrives — until then the card politely shows
          "Endorsement forthcoming."
        fields:
          - name: "items"
            label: "Endorsements"
            label_singular: "Endorsement"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - name: "name"
                label: "Name"
                widget: "string"
              - name: "role"
                label: "Role / affiliation"
                widget: "string"
              - name: "quote"
                label: "Quote (leave blank if not received yet)"
                widget: "text"
                required: false

  - name: "gallery"
    label: "Photo Gallery"
    icon: "photo_library"
    files:
      - name: "photos"
        label: "Photo Gallery"
        file: "src/_data/gallery.json"
        description: >-
          The photos on the Gallery page, in the order shown. Click an entry to
          change its caption, or add a new photo at the bottom — you can drag
          entries to reorder them. Captions are optional.
        fields:
          - name: "items"
            label: "Photos"
            label_singular: "Photo"
            widget: "list"
            summary: "{{fields.caption}}"
            fields:
              - name: "image"
                label: "Photo"
                widget: "image"
              - name: "alt"
                label: "Short description (for accessibility — a few words)"
                widget: "string"
              - name: "caption"
                label: "Caption (optional, shows under the photo)"
                widget: "string"
                required: false
